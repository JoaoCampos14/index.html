<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aniversários — Artefato Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Calibri, Arial, sans-serif;
      background: #121c1c;
      color: #e0eeee;
      min-height: 100vh;
      padding: 28px 16px 48px;
    }

    .wrapper {
      max-width: 660px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      padding-bottom: 18px;
      border-bottom: 2px solid #004848;
    }

    .logo-badge {
      background: #004848;
      color: #fff;
      font-size: 22px;
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .page-header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.3;
    }

    .page-header p {
      font-size: 12px;
      color: #7aadad;
      margin-top: 2px;
    }

    /* ── Month block ─────────────────────────────── */
    .month-block {
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    .month-title {
      background: #004848;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 9px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-title .cal-icon {
      font-size: 15px;
      opacity: .85;
    }

    .person-list {
      background: #1a2c2c;
    }

    .person-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid #0d2020;
      transition: background .15s;
    }

    .person-row:last-child { border-bottom: none; }
    .person-row:hover { background: #1f3535; }

    /* highlight today's birthday */
    .person-row.today {
      background: #002e2e;
      border-left: 3px solid #00c4a7;
    }

    .person-row.today .person-name::after {
      content: ' 🎂';
    }

    .person-name {
      font-size: 14px;
      color: #d6eded;
      font-weight: 500;
    }

    .person-date {
      font-size: 12px;
      color: #5fa8a8;
      font-family: 'Consolas', monospace;
      background: #0d2626;
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* upcoming badge */
    .soon-badge {
      font-size: 10px;
      background: #ff9230;
      color: #1a0a00;
      border-radius: 4px;
      padding: 1px 6px;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Footer ─────────────────────────────────── */
    .page-footer {
      margin-top: 32px;
      border-top: 1px solid #004848;
      padding-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .page-footer span {
      font-size: 11px;
      color: #3a6e6e;
    }

    .brand {
      font-size: 11px;
      color: #5fa8a8;
      font-weight: 600;
      letter-spacing: .04em;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header class="page-header">
    <div class="logo-badge">🎉</div>
    <div>
      <h1>Lista de Aniversários</h1>
      <p>Artefato Digital · escritório virtual</p>
    </div>
  </header>

  <div id="birthday-list"></div>

  <footer class="page-footer">
    <span id="today-label"></span>
    <span class="brand">Artefato Digital</span>
  </footer>

</div>

<script>
  const data = [
    { month: 1,  name: "Daniel Costa", day: 8,  year: 1999 },
    { month: 1,  name: "João Vitor",   day: 21, year: 2000 },
    { month: 2,  name: "Luis",         day: 18, year: 2004 },
    { month: 2,  name: "Gustavo",      day: 28, year: 2002 },
    { month: 3,  name: "Renan",        day: 28, year: 1999 },
    { month: 4,  name: "Tobias",       day: 14, year: 1997 },
    { month: 6,  name: "Ana Alice",    day: 9,  year: 2006 },
    { month: 6,  name: "Filipe",       day: 14, year: 1992 },
    { month: 6,  name: "Lucas",        day: 28, year: 2002 },
    { month: 6,  name: "Antônio",      day: 28, year: 2006 },
    { month: 7,  name: "Rafael",       day: 7,  year: 2002 },
    { month: 8,  name: "Paulo",        day: 26, year: 1991 },
    { month: 12, name: "Helbert",      day: 7,  year: 1985 },
    { month: 12, name: "San Cunha",    day: 22, year: 1997 },
    { month: 12, name: "Guilherme",    day: 24, year: 2001 },
    { month: 12, name: "João Campos",  day: 27, year: 2006 },
  ];

  const monthNames = [
    '', 'Janeiro','Fevereiro','Março','Abril','Maio','Junho',
    'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'
  ];

  const now   = new Date();
  const todayM = now.getMonth() + 1;
  const todayD = now.getDate();

  function daysBetween(m, d) {
    const cur  = new Date(now.getFullYear(), todayM - 1, todayD);
    let bday   = new Date(now.getFullYear(), m - 1, d);
    if (bday < cur) bday.setFullYear(now.getFullYear() + 1);
    return Math.round((bday - cur) / 86400000);
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  // group by month
  const grouped = {};
  data.forEach(p => {
    if (!grouped[p.month]) grouped[p.month] = [];
    grouped[p.month].push(p);
  });

  const container = document.getElementById('birthday-list');

  Object.keys(grouped)
    .map(Number)
    .sort((a, b) => a - b)
    .forEach(m => {
      const block = document.createElement('div');
      block.className = 'month-block';

      const title = document.createElement('div');
      title.className = 'month-title';
      title.innerHTML = `<span class="cal-icon">📅</span>${monthNames[m]}`;
      block.appendChild(title);

      const list = document.createElement('div');
      list.className = 'person-list';

      grouped[m].forEach(p => {
        const diff = daysBetween(p.month, p.day);
        const isToday  = p.month === todayM && p.day === todayD;
        const isSoon   = !isToday && diff <= 7;

        const row = document.createElement('div');
        row.className = 'person-row' + (isToday ? ' today' : '');

        const nameEl = document.createElement('span');
        nameEl.className = 'person-name';
        nameEl.textContent = p.name;
        if (isSoon) {
          const badge = document.createElement('span');
          badge.className = 'soon-badge';
          badge.textContent = diff === 1 ? 'amanhã' : `em ${diff}d`;
          nameEl.appendChild(badge);
        }

        const dateEl = document.createElement('span');
        dateEl.className = 'person-date';
        dateEl.textContent = `${pad(p.day)}/${pad(p.month)}/${p.year}`;

        row.appendChild(nameEl);
        row.appendChild(dateEl);
        list.appendChild(row);
      });

      block.appendChild(list);
      container.appendChild(block);
    });

  document.getElementById('today-label').textContent =
    `Hoje: ${pad(todayD)}/${pad(todayM)}/${now.getFullYear()}`;
</script>
</body>
</html>
